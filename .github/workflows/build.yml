name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'app.jsx'
      - 'tailwind.css'
      - 'tailwind.config.js'
      - 'src/index.html'
      - 'scripts/inline.js'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit built index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html dist/app.js dist/app.css
          git diff --cached --quiet || git commit -m "build: auto-compile JSX + Tailwind [skip ci]"
          git push
